name: F-Droid Parity

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify (vX.Y.Z)"
        required: true
        type: string

env:
  JAVA_VERSION: "21"
  ANDROID_PLATFORM: "android-36"
  ANDROID_BUILD_TOOLS: "36.0.0"

jobs:
  parity:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Checkout CI tooling
        uses: actions/checkout@v4
        with:
          ref: main
          path: ci-tools

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager --install "platform-tools" "platforms;${ANDROID_PLATFORM}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Run parity build in Debian forky container
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          RELEASE_REF: ${{ github.event.inputs.tag }}
        run: |
          docker run --rm \
            -e ANDROID_HOME=/opt/android-sdk \
            -e ANDROID_SDK_ROOT=/opt/android-sdk \
            -e ANDROID_BUILD_TOOLS="${ANDROID_BUILD_TOOLS}" \
            -e RELEASE_REF="${RELEASE_REF}" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${ANDROID_SDK_ROOT}:/opt/android-sdk" \
            -w /workspace \
            debian:forky-slim \
            bash ci-tools/scripts/ci_fdroid_parity.sh parity

      - name: Collect parity artifacts
        if: always()
        run: |
          mkdir -p parity-artifacts
          shopt -s nullglob
          for f in tmp/*.apk unsigned/*.apk unsigned/binaries/*.apk logs/*.log; do
            cp "$f" parity-artifacts/
          done
          UNSIGNED_APK="build/com.wordtracer.app/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "${UNSIGNED_APK}" ]; then
            cp "${UNSIGNED_APK}" parity-artifacts/parity-app-release-unsigned.apk
          fi
          if ls parity-artifacts/*.apk >/dev/null 2>&1; then
            sha256sum parity-artifacts/*.apk | sort > parity-artifacts/SHA256SUMS.txt
            {
              echo "### F-Droid Parity APK Hashes"
              echo
              while IFS= read -r line; do
                file_name=$(echo "${line}" | awk '{print $2}')
                hash_value=$(echo "${line}" | awk '{print $1}')
                echo "- ${file_name}: ${hash_value}"
              done < parity-artifacts/SHA256SUMS.txt
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            {
              echo "### F-Droid Parity APK Hashes"
              echo
              echo "- no APK artifacts were produced"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload parity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-parity-artifacts
          path: parity-artifacts
          if-no-files-found: warn
