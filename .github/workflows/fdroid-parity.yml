name: F-Droid Parity

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify (vX.Y.Z)"
        required: true
        type: string

env:
  JAVA_VERSION: "21"
  ANDROID_PLATFORM: "android-36"
  ANDROID_BUILD_TOOLS: "36.0.0"

jobs:
  parity:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager --install "platform-tools" "platforms;${ANDROID_PLATFORM}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Run parity build in Debian forky container
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          docker run --rm \
            -e ANDROID_HOME=/opt/android-sdk \
            -e ANDROID_SDK_ROOT=/opt/android-sdk \
            -e ANDROID_BUILD_TOOLS="${ANDROID_BUILD_TOOLS}" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${ANDROID_SDK_ROOT}:/opt/android-sdk" \
            -w /workspace \
            debian:forky-slim \
            bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends ca-certificates curl git python3 python3-pip default-jdk-headless unzip nodejs npm
              fdroidserver=/opt/fdroidserver
              mkdir -p "${fdroidserver}"
              curl --silent --show-error --location https://gitlab.com/fdroid/fdroidserver/-/archive/master/fdroidserver-master.tar.gz | tar -xz --directory="${fdroidserver}" --strip-components=1
              python3 -m pip install --break-system-packages --upgrade -e "${fdroidserver}"
              mkdir -p config
              cat > config/categories.yml << "EOF"
              Games:
                name: Games
              EOF
              export PATH="${ANDROID_SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS}:$PATH"
              python3 --version
              ${fdroidserver}/fdroid --version
              java -version
              node --version
              npm --version
              apksigner version
              ${fdroidserver}/fdroid lint com.wordtracer.app
              ${fdroidserver}/fdroid build -v -l --stop --test com.wordtracer.app
            '

      - name: Collect parity artifacts
        if: always()
        run: |
          mkdir -p parity-artifacts
          shopt -s nullglob
          for f in tmp/*.apk unsigned/*.apk unsigned/binaries/*.apk logs/*.log; do
            cp "$f" parity-artifacts/
          done
          if ls parity-artifacts/*.apk >/dev/null 2>&1; then
            sha256sum parity-artifacts/*.apk > parity-artifacts/SHA256SUMS.txt
          fi

      - name: Upload parity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-parity-artifacts
          path: parity-artifacts
          if-no-files-found: warn

  release_candidate:
    runs-on: ubuntu-24.04
    needs: parity
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager --install "platform-tools" "platforms;${ANDROID_PLATFORM}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Build release candidate in Debian forky container
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          docker run --rm \
            -e ANDROID_HOME=/opt/android-sdk \
            -e ANDROID_SDK_ROOT=/opt/android-sdk \
            -e ANDROID_BUILD_TOOLS="${ANDROID_BUILD_TOOLS}" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${ANDROID_SDK_ROOT}:/opt/android-sdk" \
            -w /workspace \
            debian:forky-slim \
            bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends ca-certificates curl git python3 python3-pip default-jdk-headless unzip nodejs npm
              fdroidserver=/opt/fdroidserver
              mkdir -p "${fdroidserver}"
              curl --silent --show-error --location https://gitlab.com/fdroid/fdroidserver/-/archive/master/fdroidserver-master.tar.gz | tar -xz --directory="${fdroidserver}" --strip-components=1
              python3 -m pip install --break-system-packages --upgrade -e "${fdroidserver}"
              export PATH="${ANDROID_SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS}:$PATH"
              ${fdroidserver}/fdroid build -v -l --stop com.wordtracer.app
            '

      - name: Collect release candidate artifacts
        if: always()
        run: |
          mkdir -p release-candidate-artifacts
          shopt -s nullglob
          for f in unsigned/*.apk unsigned/binaries/*.apk logs/*.log; do
            cp "$f" release-candidate-artifacts/
          done
          if ls release-candidate-artifacts/*.apk >/dev/null 2>&1; then
            sha256sum release-candidate-artifacts/*.apk > release-candidate-artifacts/SHA256SUMS.txt
          fi

      - name: Upload release candidate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-release-candidate-artifacts
          path: release-candidate-artifacts
          if-no-files-found: warn
