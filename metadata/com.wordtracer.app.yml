Categories:
  - Games
License: MIT
AuthorName: Paul Hoskinson
SourceCode: https://github.com/plhosk/wordtracer
IssueTracker: https://github.com/plhosk/wordtracer/issues

AutoName: Word Tracer

RepoType: git
Repo: https://github.com/plhosk/wordtracer

Builds:
  - versionName: 1.0.5
    versionCode: 5
    commit: v1.0.5
    subdir: android/app
    sudo:
      - echo "deb https://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky npm
    init:
      - npm ci --prefix ../..
      - npm --prefix ../.. run cap:sync
    gradle:
      - yes
    scandelete:
      - node_modules

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v(\d+\.)?(\d+\.)?(\*|\d+)$
CurrentVersion: 1.0.5
CurrentVersionCode: 5
