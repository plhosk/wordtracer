Categories:
  - Games
License: MIT
AuthorName: Paul Hoskinson
SourceCode: https://github.com/plhosk/wordtracer
IssueTracker: https://github.com/plhosk/wordtracer/issues

AutoName: Word Tracer
Summary: A crossword-like word puzzle game
Description: |-
    Word Tracer is a crossword-like puzzle game where you find hidden words from a swipeable letter wheel.

    Features:
    - Multiple level packs with progressive difficulty
    - Hint system
    - Light and dark themes
    - Offline play
    - No ads or tracking

RepoType: git
Repo: https://github.com/plhosk/wordtracer

Builds:
  - versionName: 1.0.0
    versionCode: 1
    commit: v1.0.0
    subdir: android
    init:
      - npm ci --prefix ..
      - npm --prefix .. run cap:sync
    gradle:
      - assembleRelease
    output: app/build/outputs/apk/release/app-release-unsigned.apk

AutoUpdateMode: Version
UpdateCheckMode: Tags
CurrentVersion: 1.0.0
CurrentVersionCode: 1
