Categories:
  - Games
License: MIT
AuthorName: Paul Hoskinson
SourceCode: https://github.com/plhosk/wordtracer
IssueTracker: https://github.com/plhosk/wordtracer/issues

AutoName: Word Tracer
Summary: A crossword-like word puzzle game
Description: |-
  Word Tracer is a word puzzle game with crossword-style boards and a swipeable letter wheel.
  Trace words to reveal the grid, discover bonus words, and clear levels with increasing difficulty.

  Features:
  - Thousands of levels across multiple packs
  - Built-in dictionary lookups and hint system
  - Offline play
  - No ads or tracking

RepoType: git
Repo: https://github.com/plhosk/wordtracer

Builds:
  - versionName: 1.0.1
    versionCode: 2
    commit: v1.0.1
    subdir: android
    init:
      - npm ci --prefix ..
      - npm --prefix .. run cap:sync
    gradle:
      - assembleRelease
    output: app/build/outputs/apk/release/app-release-unsigned.apk

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags ^v(\d+\.)?(\d+\.)?(\*|\d+)$
CurrentVersion: 1.0.1
CurrentVersionCode: 2
